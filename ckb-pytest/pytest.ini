[pytest]
;ci
;addopts = --html=report/report.html
;debug
addopts = -s
markers =
    integration: integration tests that exercise the framework or trezorctl boundary
    device: tests that require a connected Trezor device or emulator
    onchain: tests that require CKB RPC/on-chain data
    manual_ui: tests that require manual confirmation on the Trezor screen
    negative: negative/error-path tests
    slow: large or slow boundary tests
    p0: highest-priority smoke/regression cases
    p1: normal-priority regression cases
    p2: lower-priority compatibility/boundary cases
